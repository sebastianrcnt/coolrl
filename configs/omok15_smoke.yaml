experiment_name: omok15_smoke
seed: 5
max_iterations: 1
device: auto

rules:
  board_size: 15
  exactly_five: false

network:
  channels: 24
  blocks: 1
  value_hidden: 64
  se_reduction: 8

selfplay:
  mcts_backend: python
  evaluator_backend: torch
  games_per_iteration: 1
  batch_size: 1
  num_workers: auto
  temperature_moves: 6
  dirichlet_alpha: 0.12
  dirichlet_epsilon: 0.15
  c_puct: 1.7
  leaves_per_batch: 1
  simulation_schedule:
    - fraction: 0.0
      simulations: 4

optimization:
  batch_size: 8
  updates_per_iteration: 1
  learning_rate: 0.001
  weight_decay: 0.0001
  replay_capacity: 512
  warmup_games: 1

arena:
  games: 0
  simulations: 0
  bootstrap_games: 0
  bootstrap_simulations: 0
  bootstrap_accept_win_rate: 0.0

checkpoint:
  directory: checkpoints/omok15_smoke
  save_every_iteration: true
