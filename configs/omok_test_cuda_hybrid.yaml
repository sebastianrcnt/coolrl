# Small/fast CUDA test profile — CPU-parallel self-play strategy.
#
# Pairs with omok_test_cuda_gpu.yaml for A/B benchmarking. Both configs use the
# same network and workload; only the self-play parallelism strategy differs.
# Compare duration_seconds in metrics.jsonl after a few iterations.
#
# This profile: num_workers=auto spawns CPU workers that run MCTS + NN
# inference independently per chunk. The 3090 stays idle during self-play and
# is only used for training and arena in the main process.
experiment_name: omok_test_cuda_hybrid
seed: 29
max_iterations: 3
device: CUDA
use_amp: true

rules:
  board_size: 9
  exactly_five: false

network:
  channels: 32
  blocks: 3
  value_hidden: 64
  se_reduction: 8

selfplay:
  games_per_iteration: 16

  # 16 games / batch_size 4 = 4 chunks. With num_workers:auto the pool will
  # run them concurrently (up to cpu_count workers).
  batch_size: 4
  num_workers: auto

  search_threads: 1
  inference_batch_size: 256
  inference_wait_ms: 1.0

  temperature_moves: 6
  temperature_end: 0.1
  dirichlet_alpha: 0.30
  dirichlet_epsilon: 0.25
  c_puct: 1.6
  virtual_loss: 1.0

  leaves_per_batch: 4

  simulation_ramp_iterations: 3
  candidate_mix_fraction: 0.0
  mixed_iterations_after_promotion: 0
  simulation_schedule:
    - fraction: 0.0
      simulations: 32

optimization:
  batch_size: 64
  updates_per_iteration: 16
  learning_rate: 0.001
  min_learning_rate: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  replay_capacity: 8000
  warmup_games: 0
  policy_loss_weight: 1.0
  value_loss_weight: 1.0
  value_discount: 0.98
  recency_temperature: 0.0

arena:
  games: 0
  simulations: 0
  accept_win_rate: 0.55
  min_white_win_rate: 0.0
  bootstrap_games: 0
  bootstrap_simulations: 0
  bootstrap_accept_win_rate: 0.5
  bootstrap_min_white_win_rate: 0.0

checkpoint:
  directory: checkpoints/omok_test_cuda_hybrid
  save_every_iteration: true
  save_iteration_interval: 1
  progress_interval_batches: 2
  progress_interval_seconds: 10.0
