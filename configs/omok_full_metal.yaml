# Full-sized Omok profile for Apple Silicon / Metal.
#
# This profile keeps the same model size and training targets as the reference
# full profile, but uses a different self-play strategy from CUDA. On Apple
# Silicon, MCTS is often limited by Python tree traversal, synchronization, and
# many small inference calls. The CPU and GPU also share memory, so the benefit
# of forcing all self-play through one Metal evaluator is less clear than on a
# discrete NVIDIA GPU.
#
# The trainer's multi-process self-play workers intentionally run on CPU. That
# is a reasonable trade-off on Apple Silicon: multiple CPU workers can generate
# independent games while the main process keeps Metal available for training.
# The important part is to keep batch_size smaller than games_per_iteration so
# num_workers:auto creates multiple chunks instead of a single worker task.
#
# Unlike the CUDA profile, num_workers:auto is expected to be useful here. CUDA
# has a discrete GPU that benefits from large main-process inference batches;
# Metal shares memory with the CPU and the worker path avoids fragile shared GPU
# contexts by design.
#
# Keep this checkpoint directory separate from CUDA/CPU runs. Replay buffers,
# optimizer state, and timing assumptions should not be mixed across hardware
# profiles.
experiment_name: omok_full_metal
seed: 29
max_hours: null
device: METAL
use_amp: true

rules:
  board_size: 9
  exactly_five: false

network:
  channels: 64
  blocks: 6
  value_hidden: 128
  se_reduction: 8

selfplay:
  mcts_backend: c
  games_per_iteration: 64

  # Metal profile: split 64 games into many chunks so ProcessPoolExecutor can
  # actually use several CPU workers. If this were 64, there would be only one
  # chunk, so num_workers:auto would still run as workers=1.
  batch_size: 4

  # On Apple Silicon this enables CPU self-play parallelism. The worker path
  # deliberately avoids sharing a Metal context across processes, which is more
  # robust than trying to run many spawned workers against one GPU backend.
  num_workers: auto

  # C MCTS splits batched tree traversal across this many host threads.
  search_threads: 4

  # Reference compatibility fields. Async inference queues are not implemented
  # yet, so these are currently documentation/compatibility fields rather than
  # active throughput knobs.
  inference_batch_size: 512
  inference_wait_ms: 2.0

  temperature_moves: 10
  temperature_end: 0.1
  dirichlet_alpha: 0.30
  dirichlet_epsilon: 0.25
  c_puct: 1.6
  virtual_loss: 1.0

  # Smaller than CUDA's global 64-game batch, but larger than the old Python
  # tree-walk setting because C MCTS can collect leaves cheaply. With
  # batch_size=4 this gives each worker up to 32 positions per inference call.
  leaves_per_batch: 8

  simulation_ramp_iterations: 96
  candidate_mix_fraction: 0.5
  mixed_iterations_after_promotion: 8
  simulation_schedule:
    - fraction: 0.0
      simulations: 96
    - fraction: 0.4
      simulations: 160
    - fraction: 0.8
      simulations: 256

optimization:
  batch_size: 256
  updates_per_iteration: 96
  learning_rate: 0.0005
  min_learning_rate: 0.0005
  weight_decay: 0.0001
  grad_clip: 1.0
  replay_capacity: 80000
  warmup_games: 128
  policy_loss_weight: 1.0
  value_loss_weight: 1.5
  value_discount: 0.98
  recency_temperature: 3.0e-5

arena:
  games: 48
  simulations: 192
  accept_win_rate: 0.55
  min_white_win_rate: 0.1667
  bootstrap_games: 24
  bootstrap_simulations: 96
  bootstrap_accept_win_rate: 0.5
  bootstrap_min_white_win_rate: 0.1667

checkpoint:
  directory: checkpoints/omok_full_metal
  save_every_iteration: true
  save_iteration_interval: 1
  progress_interval_batches: 2
  progress_interval_seconds: 20.0
