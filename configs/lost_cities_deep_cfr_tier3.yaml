experiment_name: lost_cities_deep_cfr_tier3
seed: 29
max_hours: null
max_iterations: 100
device: CUDA
use_amp: true

rules:
  tier: tier3
  n_colors: null
  n_ranks: null
  min_rank: null
  n_handshakes: null
  hand_size: null
  expedition_penalty: null
  bonus_threshold: null
  bonus_amount: null

network:
  hidden_size: 256
  num_layers: 3
  activation: relu

traversal:
  backend: python
  traversals_per_player: 100
  strategy_sample_interval: 1
  store_strategy_on_opponent_nodes: true
  store_strategy_on_traverser_nodes: true
  # Hard node cap for one traversal. When the budget is exhausted mid-expansion,
  # remaining traverser actions use the current score_diff(traverser) fallback.
  max_depth: 8
  max_nodes_per_traversal: 10000
  progress_every_traversals: 10
  num_workers: 0
  # For Ryzen 5600X, try num_workers: 4 after smoke tests pass.
  # Prefer 4-5 when multiprocessing is enabled so each worker batch amortizes
  # frozen state_dict shipping and CPU model reconstruction.
  traversal_worker_chunk_size: 4
  profile_hotspots: false
  regret_matching_epsilon: 1.0e-8

optimization:
  advantage_batch_size: 1024
  strategy_batch_size: 1024
  advantage_updates_per_iteration: 256
  strategy_updates_per_iteration: 256
  learning_rate: 0.0003
  weight_decay: 0.0001
  grad_clip: 1.0

memory:
  advantage_capacity: 2000000
  strategy_capacity: 2000000

evaluation:
  # Evaluation timeouts are folded into metrics instead of aborting training.
  eval_every: 5
  games: 100
  max_steps: 10000
  on_max_steps: score_diff
  opponents:
    - random
    - safe_heuristic

checkpoint:
  directory: checkpoints/lost_cities_deep_cfr_tier3
  save_every_iteration: true
  save_iteration_interval: 1
  save_latest_only: false
  progress_interval_seconds: 20.0
