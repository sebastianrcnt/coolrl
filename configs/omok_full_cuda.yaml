# Full-sized Omok profile for a discrete NVIDIA GPU, e.g. RTX 3090.
#
# Self-play runs single-process so NN inference stays on CUDA. num_workers > 0
# would force workers to CPU inference (selfplay_worker.py pins Device.DEFAULT
# = "CPU"), which is the Metal profile's strategy. Measured GPU utilization on
# this profile sat around 15% because single-threaded Python MCTS could not
# feed the GPU fast enough; the proper long-term fix is an inference-server
# pattern, but until then single-process GPU self-play still tends to beat
# CPU-hybrid for medium networks on a 3090.
#
# Keep this checkpoint directory separate from Metal/CPU runs. Replay buffers,
# optimizer state, and timing assumptions should not be mixed across hardware
# profiles.
experiment_name: omok_full_cuda
seed: 29
max_hours: null
device: CUDA
use_amp: true

rules:
  board_size: 9
  exactly_five: false

network:
  channels: 64
  blocks: 6
  value_hidden: 128
  se_reduction: 8

selfplay:
  games_per_iteration: 128

  # All 128 active games are fed into MCTS.search_batch together so the CUDA
  # evaluator sees one large inference batch per step.
  batch_size: 128

  # Disables ProcessPoolExecutor self-play. The multi-process worker path
  # pins inference to CPU, which would leave the 3090 idle during self-play.
  num_workers: 0

  # These fields are retained for compatibility with the reference profile.
  # The current tinygrad implementation parses them, but self-play throughput is
  # primarily controlled by batch_size, num_workers, and leaves_per_batch.
  search_threads: 4
  inference_batch_size: 512
  inference_wait_ms: 2.0

  temperature_moves: 10
  temperature_end: 0.1
  dirichlet_alpha: 0.30
  dirichlet_epsilon: 0.25
  c_puct: 1.6
  virtual_loss: 1.0

  # Expand 8 leaves per MCTS step so each inference call sees up to
  # 128*8=1024 positions. Larger values (tried 32) empirically hurt average
  # GPU utilization because the longer CPU-only gap between calls outweighs
  # the per-call batch gain.
  leaves_per_batch: 8

  simulation_ramp_iterations: 96
  candidate_mix_fraction: 0.5
  mixed_iterations_after_promotion: 8
  simulation_schedule:
    - fraction: 0.0
      simulations: 96
    - fraction: 0.4
      simulations: 160
    - fraction: 0.8
      simulations: 256

optimization:
  batch_size: 256
  updates_per_iteration: 96
  learning_rate: 0.0005
  min_learning_rate: 0.0005
  weight_decay: 0.0001
  grad_clip: 1.0
  replay_capacity: 80000
  warmup_games: 128
  policy_loss_weight: 1.0
  value_loss_weight: 1.5
  value_discount: 0.98
  recency_temperature: 3.0e-5

arena:
  games: 48
  simulations: 192
  accept_win_rate: 0.55
  min_white_win_rate: 0.1667
  bootstrap_games: 24
  bootstrap_simulations: 96
  bootstrap_accept_win_rate: 0.5
  bootstrap_min_white_win_rate: 0.1667

checkpoint:
  directory: checkpoints/omok_full_cuda
  save_every_iteration: false
  save_iteration_interval: 8
  progress_interval_batches: 2
  progress_interval_seconds: 20.0
