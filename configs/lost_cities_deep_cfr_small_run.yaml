experiment_name: lost_cities_deep_cfr_small_run
seed: 29
max_hours: null
max_iterations: 10
device: CUDA
use_amp: false

rules:
  tier: tier3
  n_colors: null
  n_ranks: null
  min_rank: null
  n_handshakes: null
  hand_size: null
  expedition_penalty: null
  bonus_threshold: null
  bonus_amount: null

network:
  hidden_size: 128
  num_layers: 2
  activation: relu

traversal:
  backend: python
  traversals_per_player: 10
  strategy_sample_interval: 1
  max_depth: 12
  max_nodes_per_traversal: 10000
  progress_every_traversals: 2
  num_workers: 0
