experiment_name: lost_cities_deep_cfr_small_run
seed: 29
max_hours: null
max_iterations: 10
device: CPU
use_amp: false

rules:
  tier: tier3
  n_colors: null
  n_ranks: null
  min_rank: null
  n_handshakes: null
  hand_size: null
  expedition_penalty: null
  bonus_threshold: null
  bonus_amount: null

network:
  hidden_size: 128
  num_layers: 2
  activation: relu

traversal:
  backend: python
  traversals_per_player: 10
  strategy_sample_interval: 1
  store_strategy_on_opponent_nodes: true
  store_strategy_on_traverser_nodes: true
  # Hard node cap for one traversal. When the budget is exhausted mid-expansion,
  # remaining traverser actions use the current score_diff(traverser) fallback.
  max_depth: 12
  max_nodes_per_traversal: 10000
  progress_every_traversals: 2
  num_workers: 0
  # If num_workers > 1, prefer 4-5 instead of 1 to amortize worker setup costs.
  traversal_worker_chunk_size: 4
  profile_hotspots: false
  regret_matching_epsilon: 1.0e-8

optimization:
  advantage_batch_size: 256
  strategy_batch_size: 256
  advantage_updates_per_iteration: 8
  strategy_updates_per_iteration: 8
  learning_rate: 0.0003
  weight_decay: 0.0001
  grad_clip: 1.0

memory:
  advantage_capacity: 100000
  strategy_capacity: 100000

evaluation:
  eval_every: 2
  games: 20
  opponents:
    - random
    - safe_heuristic
    - passive_discard

checkpoint:
  directory: checkpoints/lost_cities_deep_cfr_small_run
  save_every_iteration: true
  save_iteration_interval: 1
  save_latest_only: false
  progress_interval_seconds: 20.0
