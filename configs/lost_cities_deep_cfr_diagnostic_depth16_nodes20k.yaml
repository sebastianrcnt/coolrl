experiment_name: lost_cities_deep_cfr_diagnostic_depth16_nodes20k
seed: 31
max_hours: 4
max_iterations: 50
device: CPU
use_amp: false

rules:
  tier: tier3
  n_colors: null
  n_ranks: null
  min_rank: null
  n_handshakes: null
  hand_size: null
  expedition_penalty: null
  bonus_threshold: null
  bonus_amount: null

network:
  hidden_size: 128
  num_layers: 2
  activation: relu

traversal:
  backend: python
  traversals_per_player: 20
  strategy_sample_interval: 1
  store_strategy_on_opponent_nodes: true
  store_strategy_on_traverser_nodes: true
  max_depth: 16
  max_nodes_per_traversal: 20000
  progress_every_traversals: 10
  num_workers: 4
  traversal_worker_chunk_size: 4
  profile_hotspots: false
  regret_matching_epsilon: 1.0e-8

optimization:
  advantage_batch_size: 512
  strategy_batch_size: 512
  advantage_updates_per_iteration: 16
  strategy_updates_per_iteration: 16
  learning_rate: 0.0003
  weight_decay: 0.0001
  grad_clip: 1.0

memory:
  advantage_capacity: 500000
  strategy_capacity: 500000

evaluation:
  eval_every: 10
  games: 50
  max_steps: 10000
  on_max_steps: score_diff
  opponents:
    - random
    - safe_heuristic
    - passive_discard

checkpoint:
  directory: checkpoints/lost_cities_deep_cfr_diagnostic_depth16_nodes20k
  save_every_iteration: true
  save_iteration_interval: 1
  save_latest_only: true
  progress_interval_seconds: 20.0
