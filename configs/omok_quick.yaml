experiment_name: omok_quick
seed: 7
max_iterations: 20
device: auto

rules:
  board_size: 9
  exactly_five: false

network:
  channels: 32
  blocks: 2
  value_hidden: 64
  se_reduction: 8

selfplay:
  evaluator_backend: torch
  games_per_iteration: 8
  batch_size: 8
  num_workers: auto
  temperature_moves: 6
  dirichlet_alpha: 0.25
  dirichlet_epsilon: 0.20
  c_puct: 1.6
  leaves_per_batch: 4
  simulation_schedule:
    - fraction: 0.0
      simulations: 8
    - fraction: 0.5
      simulations: 16

optimization:
  batch_size: 64
  updates_per_iteration: 16
  learning_rate: 0.001
  weight_decay: 0.0001
  replay_capacity: 10000
  warmup_games: 4

arena:
  games: 2
  simulations: 8
  accept_win_rate: 0.55
  bootstrap_games: 2
  bootstrap_simulations: 8
  bootstrap_accept_win_rate: 0.0

checkpoint:
  directory: checkpoints/omok_quick
  save_every_iteration: true
  save_iteration_interval: 1
