experiment_name: lost_cities_deep_cfr_safe_dagger_512
seed: 53
max_iterations: 40
device: CUDA

rules:
  tier: tier3

network:
  hidden_size: 512
  num_layers: 4
  activation: relu

traversal:
  backend: python
  traversals_per_player: 500
  strategy_sample_interval: 1
  store_strategy_on_opponent_nodes: false
  store_strategy_on_traverser_nodes: true
  max_depth: 16
  max_nodes_per_traversal: 10000
  opponent_policy: safe_heuristic
  cutoff_value_mode: random_rollout
  cutoff_rollouts: 1
  cutoff_rollout_policy: safe_heuristic
  cutoff_rollout_max_steps: 300
  progress_every_traversals: 50
  num_workers: 8
  traversal_worker_chunk_size: 8
  profile_hotspots: false
  regret_matching_epsilon: 1.0e-8
  outcome_sampling_epsilon: 0.2
  outcome_sampling_value_clip: 500
  outcome_unsampled_regret: zero

optimization:
  advantage_batch_size: 1024
  strategy_batch_size: 1024
  advantage_updates_per_iteration: 256
  strategy_updates_per_iteration: 256
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0

memory:
  advantage_capacity: 2000000
  strategy_capacity: 2000000

evaluation:
  eval_every: 5
  games: 100
  max_steps: 1000
  on_max_steps: score_diff
  opponents:
    - random
    - safe_heuristic
    - safe_heuristic_loose
    - safe_heuristic_strict
    - noisy_safe
    - passive_discard

checkpoint:
  directory: checkpoints/lost_cities_deep_cfr_safe_dagger_512
  save_every_iteration: true
  save_iteration_interval: 1
  save_latest_only: false
  progress_interval_seconds: 20.0
