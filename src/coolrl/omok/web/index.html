<!DOCTYPE html>
<html lang="ko" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#eef1f7">
  <title>15×15 오목 쿨파고</title>
  <style>
    @font-face {
      font-family: 'CookieRun';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/CookieRun-Regular.woff') format('woff');
      font-weight: 400;
      font-display: swap;
    }

    @font-face {
      font-family: 'CookieRun';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.0/CookieRunOTF-Bold00.woff') format('woff');
      font-weight: 700;
      font-display: swap;
    }

    @font-face {
      font-family: 'CookieRun';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.0/CookieRunOTF-Black00.woff') format('woff');
      font-weight: 900;
      font-display: swap;
    }

    :root {
      /* Change this hue to reskin accent, status, and background wash together. */
      --theme-hue: 276deg;
      --theme-accent: hsl(var(--theme-hue) 38% 58%);
      --theme-accent-soft: hsl(var(--theme-hue) 46% 70% / 0.075);
      --theme-accent-faint: hsl(calc(var(--theme-hue) + 18deg) 52% 76% / 0.045);
      --theme-sweep-edge: hsl(var(--theme-hue) 46% 68% / 0.075);
      --theme-sweep-glow: hsl(calc(var(--theme-hue) + 12deg) 54% 72% / 0.14);
      --theme-sweep-core: hsl(calc(var(--theme-hue) + 22deg) 62% 74% / 0.24);

      --bg-base: #eef1f7;
      --text: #0a0a12;
      --muted: #5f6470;
      --subtle: #b5bac3;
      --separator: rgba(30, 35, 50, 0.08);
      --separator-strong: rgba(30, 35, 50, 0.18);

      --glass-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.62) 0%, rgba(255, 255, 255, 0.38) 100%);
      --glass-bg-subtle: linear-gradient(180deg, rgba(255, 255, 255, 0.42) 0%, rgba(255, 255, 255, 0.22) 100%);
      --glass-border: rgba(255, 255, 255, 0.75);
      --glass-highlight: rgba(255, 255, 255, 0.9);
      --glass-inner-shadow: rgba(20, 30, 60, 0.04);
      /* Shadows are tinted navy, multi-layer, low opacity — never pure black */
      --glass-shadow:
        0 0.5px 1px rgba(22, 30, 55, 0.04),
        0 2px 5px rgba(22, 30, 55, 0.05),
        0 6px 16px rgba(22, 30, 55, 0.06);
      --glass-shadow-lg:
        0 1px 2px rgba(22, 30, 55, 0.05),
        0 6px 16px rgba(22, 30, 55, 0.07),
        0 18px 40px rgba(22, 30, 55, 0.08);
      /* Disabled while isolating iOS Safari WebContent/GPU memory pressure. */
      --glass-blur: none;

      --primary-bg: linear-gradient(180deg, #2a2a32 0%, #0a0a12 100%);
      --primary-text: #ffffff;
      --primary-highlight: rgba(255, 255, 255, 0.18);

      --accent: var(--theme-accent);
      --status-thinking: var(--theme-accent);
      --status-thinking-edge: var(--theme-sweep-edge);
      --status-thinking-glow: var(--theme-sweep-glow);
      --status-thinking-core: var(--theme-sweep-core);
      --green: #28c840;
      --red: #ff453a;

      --board-line: rgba(20, 25, 40, 0.28);
      --board-star: rgba(20, 25, 40, 0.48);
      --board-grid-margin: 0.03;

      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --radius-pill: 999px;
    }

    html[data-theme="dark"] {
      --theme-accent: hsl(var(--theme-hue) 76% 72%);
      --theme-accent-soft: hsl(var(--theme-hue) 68% 68% / 0.10);
      --theme-accent-faint: hsl(calc(var(--theme-hue) + 28deg) 78% 68% / 0.07);
      --theme-sweep-edge: hsl(var(--theme-hue) 76% 72% / 0.10);
      --theme-sweep-glow: hsl(calc(var(--theme-hue) + 18deg) 86% 72% / 0.22);
      --theme-sweep-core: hsl(calc(var(--theme-hue) + 34deg) 90% 72% / 0.38);

      --bg-base: #08080f;
      --text: #f5f5f7;
      --muted: #9a9aa4;
      --subtle: #3a3a42;
      --separator: rgba(255, 255, 255, 0.08);
      --separator-strong: rgba(255, 255, 255, 0.16);

      --glass-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, rgba(255, 255, 255, 0.07) 100%);
      --glass-bg-subtle: linear-gradient(180deg, rgba(255, 255, 255, 0.10) 0%, rgba(255, 255, 255, 0.04) 100%);
      --glass-border: rgba(255, 255, 255, 0.22);
      --glass-highlight: rgba(255, 255, 255, 0.42);
      --glass-inner-shadow: rgba(0, 0, 0, 0.18);
      /* Dark: almost no outer shadow — the inset highlight and border do the separation. */
      --glass-shadow:
        0 0.5px 1px rgba(0, 0, 0, 0.3),
        0 2px 6px rgba(0, 0, 0, 0.18);
      --glass-shadow-lg:
        0 1px 2px rgba(0, 0, 0, 0.32),
        0 6px 18px rgba(0, 0, 0, 0.22);

      --primary-bg: linear-gradient(180deg, #f7f7f9 0%, #d8d8dc 100%);
      --primary-text: #0a0a12;
      --primary-highlight: rgba(255, 255, 255, 0.6);

      --board-line: rgba(235, 235, 245, 0.28);
      --board-star: rgba(235, 235, 245, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    html,
    body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'CookieRun', system-ui, sans-serif;
      background:
        radial-gradient(ellipse 120% 70% at 50% -10%, var(--theme-accent-soft) 0%, transparent 55%),
        radial-gradient(ellipse 90% 60% at 50% 110%, var(--theme-accent-faint) 0%, transparent 55%),
        linear-gradient(180deg, #eff1f5 0%, #e4e7ec 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      display: flex;
      justify-content: center;
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      overflow-x: hidden;
    }

    html[data-theme="dark"] body {
      background:
        radial-gradient(ellipse 120% 70% at 50% -10%, var(--theme-accent-soft) 0%, transparent 55%),
        radial-gradient(ellipse 90% 60% at 50% 110%, var(--theme-accent-faint) 0%, transparent 55%),
        linear-gradient(180deg, #0c0c14 0%, #050509 100%);
    }

    .app {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      position: relative;
    }

    /* ---------- Glass utility mixin (via shared properties) ---------- */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 0.5px solid var(--glass-border);
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        inset 0 -1px 0 var(--glass-inner-shadow),
        var(--glass-shadow);
    }

    .glass-subtle {
      background: var(--glass-bg-subtle);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 0.5px solid var(--glass-border);
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        var(--glass-shadow);
    }

    /* ---------- Top bar ---------- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      gap: 8px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-pill);
      background: var(--glass-bg-subtle);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 0.5px solid var(--glass-border);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: inherit;
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        var(--glass-shadow);
      transition: transform 0.08s ease-out, background 0.15s;
      touch-action: manipulation;
    }

    .icon-btn:hover {
      background: var(--glass-bg);
    }

    .icon-btn:active:not(:disabled) {
      transform: scale(0.94);
    }

    .icon-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .topbar .title {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .topbar .title .muted {
      color: var(--muted);
      font-weight: 400;
    }

    html[data-theme="dark"] .topbar .title {
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    /* ---------- Player strip ---------- */
    .players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: center;
      padding: 6px 14px 6px;
    }

    .turn-row {
      display: flex;
      justify-content: center;
      padding: 5px 14px 8px;
    }

    .player-card {
      border-radius: var(--radius-md);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      transition: outline-color 0.2s, transform 0.2s;
    }

    .player-card.right {
      flex-direction: row-reverse;
      text-align: right;
    }

    .player-card .stone {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
    }

    .player-card .stone.black {
      background: radial-gradient(circle at 35% 30%, #5a5a62 0%, #1c1c22 55%, #000 100%);
      box-shadow:
        inset 1px 1px 2px rgba(255, 255, 255, 0.18),
        inset -1px -1px 2px rgba(0, 0, 0, 0.6),
        0 1px 3px rgba(0, 0, 0, 0.3);
    }

    .player-card .stone.white {
      background: radial-gradient(circle at 35% 30%, #ffffff 0%, #eaeaee 60%, #b8b8c0 100%);
      box-shadow:
        inset 1px 1px 2px rgba(255, 255, 255, 0.9),
        inset -1px -1px 2px rgba(0, 0, 0, 0.1),
        0 1px 3px rgba(0, 0, 0, 0.15);
    }

    .player-card .meta {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .player-card .name {
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .player-card .sub {
      font-size: 0.74rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .player-card.active {
      outline: 2px solid var(--text);
      outline-offset: -2px;
    }

    .turn-pill {
      border-radius: var(--radius-pill);
      padding: 7px 13px;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      letter-spacing: -0.005em;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      max-width: 100%;
      justify-content: center;
      transition: width 0.24s ease, color 0.18s ease;
    }

    .turn-pill>* {
      position: relative;
      z-index: 1;
    }

    .turn-pill.thinking {
      color: var(--status-thinking);
    }

    .turn-pill.thinking::after {
      content: "";
      display: none;
      position: absolute;
      top: -35%;
      bottom: -35%;
      left: -92%;
      width: 88%;
      z-index: 0;
      pointer-events: none;
      background: linear-gradient(90deg,
          transparent 0%,
          var(--status-thinking-edge) 18%,
          var(--status-thinking-glow) 38%,
          var(--status-thinking-core) 50%,
          var(--status-thinking-glow) 62%,
          var(--status-thinking-edge) 82%,
          transparent 100%);
      filter: none;
      animation: none;
    }

    @keyframes thinking-sweep {
      0% {
        left: -96%;
      }

      100% {
        left: 108%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .turn-pill.thinking::after {
        animation: none;
      }
    }

    .turn-pill.win {
      color: var(--green);
    }

    .turn-pill.error {
      color: var(--red);
    }

    .turn-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 6px currentColor;
    }

    /* ---------- Board ---------- */
    .board-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px 0;
      min-height: 0;
    }

    .board-card {
      border-radius: var(--radius-lg);
      padding: 0;
      width: 100%;
      aspect-ratio: 1 / 1;
      max-width: min(100vw, calc(100dvh - 226px));
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      /* Blur is disabled while testing iOS Safari GPU/WebContent pressure. */
      background: var(--glass-bg-subtle);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: 0.5px solid var(--glass-border);
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        inset 0 -0.5px 0 var(--glass-inner-shadow),
        var(--glass-shadow-lg);
    }

    canvas#board {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      touch-action: manipulation;
      position: relative;
      z-index: 1;
    }

    /* ---------- Bottom action bar ---------- */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 12px 14px max(18px, env(safe-area-inset-bottom));
    }

    .action-btn {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 0.5px solid var(--glass-border);
      color: var(--text);
      border-radius: var(--radius-md);
      padding: 14px 10px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      line-height: 1.15;
      text-align: center;
      white-space: normal;
      min-width: 0;
      box-shadow:
        inset 0 1px 0 var(--glass-highlight),
        inset 0 -1px 0 var(--glass-inner-shadow),
        var(--glass-shadow);
      transition: transform 0.08s ease-out, opacity 0.15s;
      min-height: 54px;
      touch-action: manipulation;
    }

    .action-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    .action-btn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .action-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-btn.primary {
      background: var(--primary-bg);
      color: var(--primary-text);
      border-color: transparent;
      box-shadow:
        inset 0 1px 0 var(--primary-highlight),
        inset 0 -1px 2px rgba(0, 0, 0, 0.10),
        0 1px 2px rgba(15, 20, 38, 0.10),
        0 5px 14px rgba(15, 20, 38, 0.14);
    }

    html[data-theme="dark"] .action-btn.primary {
      box-shadow:
        inset 0 1px 0 var(--primary-highlight),
        inset 0 -1px 2px rgba(0, 0, 0, 0.08),
        0 1px 2px rgba(0, 0, 0, 0.35),
        0 4px 12px rgba(0, 0, 0, 0.25);
    }

    .action-btn.primary:disabled {
      background: var(--glass-bg);
      color: var(--muted);
      border: 0.5px solid var(--glass-border);
    }

    /* ---------- Runtime debug overlay ---------- */
    .debug-panel {
      position: fixed;
      left: max(8px, calc(50% - 280px + 8px));
      bottom: max(86px, calc(env(safe-area-inset-bottom) + 86px));
      width: min(360px, calc(100vw - 16px));
      max-height: min(32dvh, 210px);
      overflow: auto;
      z-index: 8;
      border-radius: var(--radius-md);
      padding: 9px 10px 10px;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: 0.5px solid rgba(220, 224, 232, 0.9);
      box-shadow:
        0 1px 2px rgba(28, 32, 46, 0.06),
        0 8px 24px rgba(28, 32, 46, 0.10);
      color: var(--muted);
      font-size: 0.68rem;
      line-height: 1.35;
      font-variant-numeric: tabular-nums;
    }

    .debug-panel summary {
      position: sticky;
      top: -9px;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      list-style: none;
      cursor: pointer;
      color: var(--text);
      font-weight: 700;
      margin: -9px -10px 7px;
      padding: 9px 10px 7px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 0.5px solid rgba(220, 224, 232, 0.72);
    }

    .debug-panel summary::-webkit-details-marker {
      display: none;
    }

    .debug-panel summary::after {
      content: "접기";
      color: var(--muted);
      font-size: 0.62rem;
      font-weight: 400;
    }

    .debug-panel:not([open]) {
      width: auto;
      max-height: none;
      padding: 8px 10px;
      overflow: visible;
    }

    .debug-panel:not([open]) summary {
      position: static;
      margin: -8px -10px;
      padding: 8px 10px;
      border-bottom: none;
    }

    .debug-panel:not([open]) summary::after {
      content: "열기";
    }

    .debug-grid {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 3px 9px;
    }

    .debug-k {
      color: var(--subtle);
      white-space: nowrap;
    }

    .debug-v {
      min-width: 0;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    html.ios-low-memory .glass,
    html.ios-low-memory .glass-subtle,
    html.ios-low-memory .icon-btn,
    html.ios-low-memory .action-btn,
    html.ios-low-memory .board-card,
    html.ios-low-memory .sheet-backdrop {
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    html.ios-low-memory .turn-pill.thinking::after {
      display: none;
      animation: none;
    }

    /* ---------- Settings sheet ---------- */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .sheet-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translate(-50%, 100%);
      width: 100%;
      max-width: 560px;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: 0.5px solid rgba(220, 224, 232, 0.9);
      border-bottom: none;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 8px 14px max(20px, env(safe-area-inset-bottom));
      box-shadow:
        0 -1px 0 rgba(255, 255, 255, 0.9),
        0 -10px 32px rgba(28, 32, 46, 0.10);
      z-index: 11;
      transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 85dvh;
      overflow-y: auto;
    }

    .sheet.open {
      transform: translate(-50%, 0);
    }

    .sheet-handle {
      width: 38px;
      height: 5px;
      background: var(--subtle);
      border-radius: 999px;
      margin: 6px auto 14px;
      opacity: 0.7;
    }

    .sheet-title {
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 16px;
      letter-spacing: -0.015em;
    }

    .sheet-group {
      background: #ffffff;
      border: 0.5px solid rgba(220, 224, 232, 0.95);
      border-radius: var(--radius-md);
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow:
        0 1px 2px rgba(28, 32, 46, 0.04);
    }

    .sheet-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      gap: 12px;
      min-height: 48px;
    }

    .sheet-row+.sheet-row {
      border-top: 0.5px solid var(--separator);
    }

    .sheet-row .label {
      font-size: 0.92rem;
      font-weight: 400;
      color: var(--text);
      flex-shrink: 0;
    }

    .sheet-row .value {
      font-size: 0.86rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .sheet-row select {
      background-color: #ffffff;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      color: var(--text);
      border: 0.5px solid rgba(208, 214, 224, 0.95);
      border-radius: var(--radius-sm);
      padding: 7px 30px 7px 12px;
      font-size: 0.88rem;
      font-weight: 400;
      font-family: inherit;
      cursor: pointer;
      appearance: none;

  <script>
    "use strict";

    // =========================================================================
    // GameState
    // =========================================================================
    class GameState {
      constructor(boardSize = 9) {
        this.boardSize = boardSize;
        this.actionSize = boardSize * boardSize;
        this.board = new Int8Array(this.actionSize);
        this.toPlay = 1;
        this.moveCount = 0;
        this.lastAction = null;
        this.winner = 0;
        this.terminal = false;
      }

      clone() {
        const s = new GameState(this.boardSize);
        s.board.set(this.board);
        s.toPlay = this.toPlay;
        s.moveCount = this.moveCount;
        s.lastAction = this.lastAction;
        s.winner = this.winner;
        s.terminal = this.terminal;
        return s;
      }

      legalIndices() {
        const out = [];
        if (this.terminal) return out;
        for (let i = 0; i < this.actionSize; i++) if (this.board[i] === 0) out.push(i);
        return out;
      }

      applyAction(action) {
        const player = this.toPlay;
        this.board[action] = player;
        this.lastAction = action;
        this.moveCount++;
        const row = Math.floor(action / this.boardSize);
        const col = action % this.boardSize;
        if (this._isWin(row, col, player)) {
          this.winner = player;
          this.terminal = true;
        } else if (this.moveCount >= this.actionSize) {
          this.terminal = true;
        }
        this.toPlay = -this.toPlay;
      }

      outcomeForPlayer(player) {
        if (!this.terminal) return 0;
        if (this.winner === 0) return 0;
        return this.winner === player ? 1.0 : -1.0;
      }

      _isWin(row, col, player) {
        const dirs = [[1, 0], [0, 1], [1, 1], [1, -1]];
        for (const [dr, dc] of dirs) {
          const count = 1 + this._countDir(row, col, dr, dc, player) + this._countDir(row, col, -dr, -dc, player);
          if (count >= 5) return true;
        }
        return false;
      }

      _countDir(row, col, dr, dc, player) {
        let c = 0;
        let r = row + dr, cc = col + dc;
        while (r >= 0 && r < this.boardSize && cc >= 0 && cc < this.boardSize && this.board[r * this.boardSize + cc] === player) {
          c++; r += dr; cc += dc;
        }
        return c;
      }
    }

    // =========================================================================
    // Worker-backed ONNX evaluator
    //
    // All ONNX inference runs in a dedicated Web Worker so the UI thread stays
    // responsive — backdrop-filter, animations, taps, status updates all keep
    // rendering even during long sim batches. We ship the worker as an inline
    // Blob so the single index.html deployment stays self-contained.
    // =========================================================================
    const WORKER_SRC = `
"use strict";
const ORT_CDN_BASE = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.24.3/dist/";

let session = null;
let activeBackend = "wasm";
let ortLoaded = false;
let boardSize = 9;
let planeSize = 81;
let actionSize = 81;
let featureBuffer = null;

function normalizeBackend(value) {
  return value === "webgpu" || value === "webnn" ? value : "wasm";
}

function wasmPaths(backend) {
  const useJsep = backend === "webgpu" || backend === "webnn";
  const suffix = useJsep ? ".jsep" : "";
  return {
    wasm: ORT_CDN_BASE + "ort-wasm-simd-threaded" + suffix + ".wasm",
    mjs: ORT_CDN_BASE + "ort-wasm-simd-threaded" + suffix + ".mjs",
  };
}

function loadOrt(backend) {
  if (ortLoaded) return;
  const useJsep = backend === "webgpu" || backend === "webnn";
  importScripts(ORT_CDN_BASE + (useJsep ? "ort.webgpu.min.js" : "ort.wasm.min.js"));
  ort.env.wasm.wasmPaths = wasmPaths(backend);
  ort.env.wasm.numThreads = 1;
  ort.env.wasm.proxy = false;
  ortLoaded = true;
}

function setSize(n) {
  boardSize = n;
  planeSize = n * n;
  actionSize = n * n;
}

function encodeFeatures(states) {
  const needed = states.length * 4 * planeSize;
  if (!featureBuffer || featureBuffer.length !== needed) {
    featureBuffer = new Float32Array(needed);
  } else {
    featureBuffer.fill(0);
  }
  const out = featureBuffer;
  for (let b = 0; b < states.length; b++) {
    const s = states[b];
    const base = b * 4 * planeSize;
    const toPlay = s.toPlay;
    const colorVal = toPlay === 1 ? 1.0 : 0.0;
    for (let i = 0; i < planeSize; i++) {
      const v = s.board[i];
      out[base + i] = v === toPlay ? 1.0 : 0.0;
      out[base + planeSize + i] = v === -toPlay ? 1.0 : 0.0;
      out[base + 3 * planeSize + i] = colorVal;
    }
    if (s.lastAction !== null && s.lastAction >= 0) {
      out[base + 2 * planeSize + s.lastAction] = 1.0;
    }
  }
  return out;
}

function softmax(arr, offset, len) {
  let max = -Infinity;
  for (let i = 0; i < len; i++) if (arr[offset + i] > max) max = arr[offset + i];
  let sum = 0;
  for (let i = 0; i < len; i++) {
    arr[offset + i] = Math.exp(arr[offset + i] - max);
    sum += arr[offset + i];
  }
  if (sum > 0) for (let i = 0; i < len; i++) arr[offset + i] /= sum;
}

self.onmessage = async (e) => {
  const msg = e.data;
  try {
    if (msg.type === "init") {
      setSize(msg.boardSize);
      activeBackend = normalizeBackend(msg.backend);
      loadOrt(activeBackend);
      const lowMemory = !!msg.lowMemory;
      const sessionOptions = {
        executionProviders: [activeBackend],
        graphOptimizationLevel: lowMemory ? "basic" : "all",
      };
      if (activeBackend === "wasm") {
        sessionOptions.enableCpuMemArena = !lowMemory;
        sessionOptions.enableMemPattern = !lowMemory;
        sessionOptions.executionMode = "sequential";
      }
      session = await ort.InferenceSession.create(msg.buf, sessionOptions);
      // Warm-up pass to amortize first-run WASM JIT costs
      const emptyFeat = new Float32Array(4 * planeSize);
      for (let i = 0; i < planeSize; i++) emptyFeat[3 * planeSize + i] = 1.0;
      const warm = new ort.Tensor("float32", emptyFeat, [1, 4, boardSize, boardSize]);
      await session.run({ input: warm });
      self.postMessage({ id: msg.id, ok: true, backend: activeBackend });
    } else if (msg.type === "evaluate") {
      const batch = msg.states.length;
      const features = encodeFeatures(msg.states);
      const tensor = new ort.Tensor("float32", features, [batch, 4, boardSize, boardSize]);
      const out = await session.run({ input: tensor });
      const logits = out.policy_logits.data;
      const values = out.value.data;
      if (logits.length !== batch * actionSize) {
        throw new Error("policy size " + (logits.length / batch) + " != action size " + actionSize);
      }
      const policy = new Float32Array(logits.length);
      policy.set(logits);
      for (let b = 0; b < batch; b++) softmax(policy, b * actionSize, actionSize);
      const valuesOut = new Float32Array(values);
      self.postMessage(
        { id: msg.id, ok: true, policy: policy.buffer, values: valuesOut.buffer, batch, actionSize },
        [policy.buffer, valuesOut.buffer]
      );
    }
  } catch (err) {
    self.postMessage({ id: msg.id, ok: false, error: (err && err.message) || String(err) });
  }
};
`;

    let _workerUrl = null;
    function workerUrl() {
      if (!_workerUrl) {
        _workerUrl = URL.createObjectURL(new Blob([WORKER_SRC], { type: "application/javascript" }));
      }
      return _workerUrl;
    }

    class WorkerEvaluator {
      constructor(boardSize, backend, lowMemory = false) {
        this.boardSize = boardSize;
        this.actionSize = boardSize * boardSize;
        this.backend = backend;
        this.lowMemory = lowMemory;
        this.worker = null;
        this.pending = new Map();
        this.nextId = 1;
      }

      static async fromArrayBuffer(buf, boardSize, backend = "wasm", lowMemory = false) {
        const ev = new WorkerEvaluator(boardSize, backend, lowMemory);
        ev.worker = new Worker(workerUrl());
        ev.worker.onmessage = (e) => ev._onMessage(e);
        ev.worker.onerror = (e) => ev._onError(e);
        // Transfer the model buffer to the worker so we don't pay the copy cost
        const init = await ev._send({ type: "init", buf, boardSize, backend, lowMemory }, [buf]);
        ev.backend = init.backend || backend;
        return ev;
      }

      terminate() {
        if (this.worker) {
          this.worker.terminate();
          this.worker = null;
        }
        for (const [, p] of this.pending) p.reject(new Error("evaluator terminated"));
        this.pending.clear();
      }

      _send(msg, transfer) {
        return new Promise((resolve, reject) => {
          const id = this.nextId++;
          this.pending.set(id, { resolve, reject });
          this.worker.postMessage({ ...msg, id }, transfer || []);
        });
      }

      _onMessage(e) {
        const { id, ok } = e.data;
        const p = this.pending.get(id);
        if (!p) return;
        this.pending.delete(id);
        if (ok) p.resolve(e.data);
        else p.reject(new Error(e.data.error || "worker error"));
      }

      _onError(e) {
        const msg = (e && e.message) || "worker crashed";
        for (const [, p] of this.pending) p.reject(new Error(msg));
        this.pending.clear();
      }

      async evaluate(states) {
        if (!this.worker) throw new Error("evaluator not initialized");
        // Only ship the fields the worker actually needs
        const lite = states.map((s) => ({
          boardSize: s.boardSize,
          board: s.board,
          toPlay: s.toPlay,
          lastAction: s.lastAction,
        }));
        const result = await this._send({ type: "evaluate", states: lite });
        const policyArr = new Float32Array(result.policy);
        const valuesArr = new Float32Array(result.values);
        const batch = result.batch;
        const aSize = result.actionSize;
        const policyOut = [], valueOut = [];
        for (let b = 0; b < batch; b++) {
          policyOut.push(policyArr.subarray(b * aSize, (b + 1) * aSize));
          valueOut.push(valuesArr[b]);
        }
        return { policy: policyOut, value: valueOut };
      }
    }

    // =========================================================================
    // MCTS
    // =========================================================================
    class TreeNode {
      constructor(toPlay, prior = 0) {
        this.toPlay = toPlay;
        this.prior = prior;
        this.visitCount = 0;
        this.valueSum = 0;
        this.children = new Map();
        this.expanded = false;
      }
      value() { return this.visitCount === 0 ? 0 : this.valueSum / this.visitCount; }
    }

    /*
     * Hand control back to the browser so it can paint, process input, and run
     * compositor work. WASM inference on the main thread is synchronous-inside-
     * the-microtask, so without this the UI freezes for the full sims × per-eval
     * duration. scheduler.yield() is preferred (keeps task priority); setTimeout
     * is the universally-supported fallback.
     */
    function yieldToBrowser() {
      if (typeof scheduler !== "undefined" && typeof scheduler.yield === "function") {
        return scheduler.yield();
      }
      return new Promise((resolve) => setTimeout(resolve, 0));
    }

    class MCTS {
      constructor({ cPuct = 1.6, evaluator, yieldEveryMs = 14, maxChildren = Infinity }) {
        this.cPuct = cPuct;
        this.evaluator = evaluator;
        this.yieldEveryMs = yieldEveryMs;
        this.maxChildren = maxChildren;
      }

      async run(state, numSims, { reuseRoot = null, onProgress = null } = {}) {
        const root = reuseRoot && reuseRoot.toPlay === state.toPlay ? reuseRoot : new TreeNode(state.toPlay);
        if (!root.expanded && !state.terminal) {
          const { policy, value } = await this.evaluator.evaluate([state]);
          this._expand(root, state, policy[0]);
          root.rootValue = value[0];
          if (onProgress) onProgress(1, numSims, this._candidateHints(root, state));
          // Yield once after root expansion so the thinking status paints
          // before the sim loop starts another blocking eval.
          await yieldToBrowser();
        }

        let yieldClock = performance.now();

        for (let sim = 0; sim < numSims; sim++) {
          let node = root;
          const path = [node];
          const simState = state.clone();

          while (node.expanded && node.children.size > 0 && !simState.terminal) {
            const [action, child] = this._selectChild(node);
            simState.applyAction(action);
            node = child;
            path.push(node);
          }

          let leafValue;
          if (simState.terminal) {
            leafValue = simState.outcomeForPlayer(simState.toPlay);
          } else {
            const { policy, value } = await this.evaluator.evaluate([simState]);
            this._expand(node, simState, policy[0]);
            leafValue = value[0];
          }
          this._backup(path, leafValue);

          // Cooperative yield: when ~one frame of work has elapsed, update progress
          // and release the event loop so the browser can paint & process input.
          const now = performance.now();
          if (now - yieldClock >= this.yieldEveryMs) {
            if (onProgress) onProgress(sim + 1, numSims, this._candidateHints(root, state));
            await yieldToBrowser();
            yieldClock = performance.now();
          }
        }
        if (onProgress) onProgress(numSims, numSims, this._candidateHints(root, state));
        return this._chooseAction(root, state);
      }

      _selectChild(node) {
        const sqrtN = Math.sqrt(Math.max(1, node.visitCount));
        let bestAction = -1, bestScore = -Infinity, bestChild = null;
        for (const [action, child] of node.children) {
          const q = -child.value();
          const u = (this.cPuct * child.prior * sqrtN) / (1 + child.visitCount);
          const score = q + u;
          if (score > bestScore) { bestScore = score; bestAction = action; bestChild = child; }
        }
        return [bestAction, bestChild];
      }

      _expand(node, state, priors) {
        const legal = this._limitedLegalActions(state.legalIndices(), priors);
        let total = 0;
        for (const a of legal) total += priors[a];
        node.children.clear();
        if (total <= 0 || !isFinite(total)) {
          const u = 1.0 / legal.length;
          for (const a of legal) node.children.set(a, new TreeNode(-state.toPlay, u));
        } else {
          for (const a of legal) node.children.set(a, new TreeNode(-state.toPlay, priors[a] / total));
        }
        node.expanded = true;
      }

      _limitedLegalActions(legal, priors) {
        if (!Number.isFinite(this.maxChildren) || legal.length <= this.maxChildren) return legal;
        return legal
          .map((action) => [action, Number.isFinite(priors[action]) ? priors[action] : -Infinity])
          .sort((a, b) => b[1] - a[1])
          .slice(0, this.maxChildren)
          .map(([action]) => action);
      }

      _backup(path, value) {
        let v = value;
        for (let i = path.length - 1; i >= 0; i--) {
          path[i].visitCount++;
          path[i].valueSum += v;
          v = -v;
        }
      }

      _candidateHints(root, state, limit = 10) {
        if (!root || !root.children || root.children.size === 0) return [];
        return [...root.children.entries()]
          .filter(([action]) => state.board[action] === 0)
          .map(([action, child]) => ({
            action,
            visits: child.visitCount,
            prior: child.prior,
          }))
          .sort((a, b) => (b.visits - a.visits) || (b.prior - a.prior))
          .slice(0, limit);
      }

      _chooseAction(root, state) {
        let best = -1, bestCount = -1, total = 0;
        for (const [action, child] of root.children) {
          total += child.visitCount;
          if (child.visitCount > bestCount) { bestCount = child.visitCount; best = action; }
        }
        if (total === 0) {
          const legal = state.legalIndices();
          best = legal[Math.floor(Math.random() * legal.length)];
        }
        return {
          action: best,
          rootValue: root.value(),
          nextRoot: state.terminal ? null : root.children.get(best) || null,
        };
      }
    }

      if (boardSize < 9) return [[Math.floor(boardSize / 2), Math.floor(boardSize / 2)]];
      const edge = boardSize >= 13 ? 3 : 2;
      const center = Math.floor(boardSize / 2);
      return [
        [edge, edge],
        [edge, boardSize - 1 - edge],
        [center, center],
        [boardSize - 1 - edge, edge],
        [boardSize - 1 - edge, boardSize - 1 - edge],
      ];

    function easeOutBack(t) {
      const c = 1.70158, s = c + 1;
      return 1 + s * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2);
    }

    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInCubic(t) { return t * t * t; }

function tickAnims() {

function startThinkingGhosts(player) {

}

function stopThinkingGhosts(redrawNow = true) {
  app.thinkingGhostPlayer = 0;
  app.thinkingGhostCandidates = [];
  app.thinkingGhostSlots = [];
  app.thinkingGhostLastSpawn = 0;
  if (app.thinkingGhostRaf) {
    cancelAnimationFrame(app.thinkingGhostRaf);
    app.thinkingGhostRaf = 0;
  }
  if (redrawNow) redraw();
}

function updateThinkingGhostCandidates(candidates) {
  app.thinkingGhostCandidates = (candidates || [])
    .map((item) => typeof item === "number" ? item : item.action)
    .filter((action) => Number.isInteger(action) && app.game.board[action] === 0)
    .slice(0, 10);
}

function pickThinkingGhostAction() {
  const active = new Set(app.thinkingGhostSlots.map((slot) => slot.action));
  let pool = app.thinkingGhostCandidates.filter((action) => app.game.board[action] === 0 && !active.has(action));
  if (pool.length === 0) {
    pool = app.game.legalIndices().filter((action) => !active.has(action));
  }
  if (pool.length === 0) return null;
  const upper = Math.min(pool.length, app.thinkingGhostCandidates.length ? 10 : pool.length);
  return pool[Math.floor(Math.random() * upper)];
}

function spawnThinkingGhost(now) {
  if (!app.thinkingGhostPlayer || app.game.terminal) return;
  const action = pickThinkingGhostAction();
  if (action === null) return;
  app.thinkingGhostSlots.push({
    action,
    player: app.thinkingGhostPlayer,
    start: now,
    life: THINKING_GHOST_LIFE_MS,
  });
  if (app.thinkingGhostSlots.length > THINKING_GHOST_MAX) {
    app.thinkingGhostSlots.splice(0, app.thinkingGhostSlots.length - THINKING_GHOST_MAX);
  }
}

function tickThinkingGhosts(now) {
  app.thinkingGhostRaf = 0;
  app.thinkingGhostSlots = app.thinkingGhostSlots.filter((slot) => now - slot.start < slot.life);

  if (!app.thinkingGhostPlayer || app.game.terminal || !app.busy) {
    if (app.thinkingGhostSlots.length > 0) {
      redraw();
      app.thinkingGhostRaf = requestAnimationFrame(tickThinkingGhosts);
    }
    return;
  }

  if (now - app.thinkingGhostLastSpawn >= THINKING_GHOST_INTERVAL_MS || app.thinkingGhostSlots.length === 0) {
    spawnThinkingGhost(now);
    app.thinkingGhostLastSpawn = now;
  }

  redraw();
  app.thinkingGhostRaf = requestAnimationFrame(tickThinkingGhosts);
}

    function hasAiModel() {

    async function modelArrayBufferForEvaluator() {
      if (app.modelBuffer) return app.modelBuffer.slice(0);
      if (app.modelFile) return app.modelFile.arrayBuffer();

        const resp = await fetch(DEFAULT_MODEL_URL, { cache: "force-cache" });
        if (!resp.ok) throw new Error(`HTTP ${resp.status} on ${DEFAULT_MODEL_URL}`);
        return resp.arrayBuffer();

    async function ensureEvaluatorReady(statusText = "쿨파고 준비 중") {
      if (app.evaluator && app.mcts) return true;
      if (!hasAiModel()) return false;

      setBusy(true);
      flashStatus(`${statusText}… ${backendLabel(app.backend)}`, "thinking", 60_000);
      if (app.evaluator) app.evaluator.terminate();
      app.evaluator = null;
      app.mcts = null;
      try {
        const buf = await modelArrayBufferForEvaluator();
        app.evaluator = await WorkerEvaluator.fromArrayBuffer(buf, app.boardSize, app.backend, lowMemoryMode());
        app.mcts = makeMcts();
        app.aiSubtree = null;
        app.statusOverride = null;
        setBusy(false);
        updateInfo();
        updateDebugPanel();
        return true;
      } catch (err) {
        console.error(err);

    function fmtValue(v) {

    function isMobileDevice() {
      const mm = window.matchMedia ? window.matchMedia.bind(window) : null;
      const narrow = mm ? mm("(max-width: 719px)").matches : window.innerWidth < 720;
      const coarse = mm ? mm("(pointer: coarse)").matches : false;
      return narrow || coarse;
    }

    function isIosDevice() {
      const ua = navigator.userAgent || "";
      const platform = navigator.platform || "";
      return /iPad|iPhone|iPod/.test(ua) ||
        (platform === "MacIntel" && navigator.maxTouchPoints > 1);
    }

    function canvasPixelRatio() {
      const dpr = window.devicePixelRatio || 1;
      if (isIosDevice()) return Math.min(dpr, MAX_IOS_CANVAS_DPR);
      return isMobileDevice() ? Math.min(dpr, MAX_MOBILE_CANVAS_DPR) : dpr;
    }

    function lowMemoryMode() {
      return isMobileDevice();
    }

    function mctsMaxChildren() {

    function shouldReuseSearchTree() {

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[ch]));
    }

    function fmtBytes(bytes) {
      if (!Number.isFinite(bytes) || bytes <= 0) return "n/a";
      const units = ["B", "KB", "MB", "GB"];
      let value = bytes;
      let unit = 0;
      while (value >= 1024 && unit < units.length - 1) {
        value /= 1024;
        unit++;
      }
      const digits = unit === 0 ? 0 : value < 10 ? 1 : 0;
      return `${value.toFixed(digits)}${units[unit]}`;
    }

    function fmtHeap() {
      const mem = performance.memory;
      if (!mem) return "n/a";
      return `${fmtBytes(mem.usedJSHeapSize)} / ${fmtBytes(mem.totalJSHeapSize)} / ${fmtBytes(mem.jsHeapSizeLimit)}`;
    }

    function setTurnPillText(text, { animate = true } = {}) {
      if (els.turnText.textContent === text) return;

      const pill = els.turnPill;
      if (!animate) {
        clearTimeout(setTurnPillText._timer);
        pill.style.width = "";
        els.turnText.textContent = text;
        return;
      }

      const oldWidth = pill.getBoundingClientRect().width;
      const reduceMotion = window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      if (reduceMotion || oldWidth <= 0) {
        els.turnText.textContent = text;
        pill.style.width = "";
        return;
      }

      clearTimeout(setTurnPillText._timer);
      const fromWidth = Math.ceil(oldWidth);
      const previousTransition = pill.style.transition;
      pill.style.transition = "none";
      pill.style.width = `${fromWidth}px`;
      void pill.offsetWidth;

      els.turnText.textContent = text;
      pill.style.width = "auto";
      const toWidth = Math.ceil(pill.getBoundingClientRect().width);
      pill.style.width = `${fromWidth}px`;
      void pill.offsetWidth;
      pill.style.transition = previousTransition;

      requestAnimationFrame(() => {
        pill.style.width = `${toWidth}px`;
      });

      setTurnPillText._timer = setTimeout(() => {
        if (els.turnText.textContent === text) pill.style.width = "";
      }, 320);
    }

        const reusable = lowMemoryMode() ? null : buf.slice(0);
        const modelBytes = file.size || buf.byteLength;
        app.evaluator = await WorkerEvaluator.fromArrayBuffer(buf, app.boardSize, app.backend, lowMemoryMode());
        app.mcts = makeMcts();
        app.modelBuffer = reusable;
        app.modelFile = lowMemoryMode() ? file : null;
        app.modelSource = "file";
        app.modelBytes = modelBytes;
        app.modelName = file.name;
        app.modelTitle = file.name;
        els.fileName.textContent = file.name;
        els.fileName.title = file.name;
        app.aiSubtree = null;
        app.statusOverride = null;
        setBusy(false);
        updateInfo();
        maybeAiMove();
        scheduleEvaluatorIdleRelease();
        return;
      } catch (err) {
        console.error(err);
        flashStatus("로드 실패", "error");
      }
      setBusy(false);
      updateInfo();
    });

    // ---- Controls ----
    els.colorSelect.addEventListener("change", () => {
      app.humanPlayer = parseInt(els.colorSelect.value);
      resetGame();
    });
    els.backendSelect.addEventListener("change", () => {
      app.backend = els.backendSelect.value;
      app.pendingAction = null;
      app.aiSubtree = null;
      app.aiValue = null;
      app.aiTimeMs = null;
      app.aiProgress = null;
      if (!app.initialSetup) reloadModelForBackend();
      else updateInfo();
    });
    els.sims.addEventListener("change", updateDebugPanel);

    els.btnReset.addEventListener("click", () => { if (!app.busy) resetGame(); });
    els.btnUndo.addEventListener("click", undo);
    els.btnAi.addEventListener("click", () => { if (hasAiModel() && !app.busy) showHint(); });
    els.btnConfirm.addEventListener("click", confirmPending);

    // ---- Settings sheet ----
    function openSheet() { els.sheet.classList.add("open"); els.sheetBackdrop.classList.add("open"); }
    function closeSheet() {
      els.sheet.classList.remove("open");
      els.sheetBackdrop.classList.remove("open");
    }
    function finishInitialSetup() {
      if (!app.initialSetup) {
        closeSheet();
        return;
      }
      app.backend = els.backendSelect.value;
      app.initialSetup = false;
      els.btnSheetClose.textContent = "완료";
      closeSheet();
      updateInfo();
      if (hasAiModel()) maybeAiMove();
      else tryAutoLoadDefault();
    }
    els.btnSettings.addEventListener("click", openSheet);
    els.btnSheetClose.addEventListener("click", finishInitialSetup);
    els.sheetBackdrop.addEventListener("click", finishInitialSetup);

    async function reloadModelForBackend() {
      if (app.busy) return;
      if (!hasAiModel()) {
        app.defaultModelLoadStarted = false;
        tryAutoLoadDefault();
        return;
      }
      setBusy(true);
      flashStatus(`추론 방식 변경 중… ${backendLabel(app.backend)}`, "thinking", 60_000);
      if (app.evaluator) app.evaluator.terminate();
      app.evaluator = null;
      app.mcts = null;
      try {
        const buf = await modelArrayBufferForEvaluator();
        app.evaluator = await WorkerEvaluator.fromArrayBuffer(buf, app.boardSize, app.backend, lowMemoryMode());
        app.mcts = makeMcts();
        app.aiSubtree = null;
        app.statusOverride = null;
        setBusy(false);
        updateInfo();
        maybeAiMove();
        scheduleEvaluatorIdleRelease();
      } catch (err) {
        console.error(err);
        setBusy(false);
        flashStatus(`${backendLabel(app.backend)} 사용 불가`, "error", 8000);
        updateInfo();
      }
    }

function resetGame() {
  stopThinkingGhosts(false);
  app.game = new GameState(app.boardSize);
      app.history = [];
      app.aiSubtree = null;
      app.pendingAction = null;
      app.aiValue = null;
      app.aiTimeMs = null;
      app.aiProgress = null;
      app.statusOverride = null;
      app.anims.clear();
      updateInfo();
      redraw();
      maybeAiMove();
    }

function undo() {
  if (app.busy) return;
  stopThinkingGhosts(false);
  if (app.pendingAction !== null) {
        app.pendingAction = null;
        updateInfo();
        redraw();
        return;
      }
      if (app.history.length === 0) return;
      const count = app.evaluator && app.history.length >= 2 ? 2 : 1;
      app.history.splice(-count, count);
      app.game = new GameState(app.boardSize);
      app.aiSubtree = null;
      app.anims.clear();
      for (const a of app.history) app.game.applyAction(a);
      app.statusOverride = null;
      updateInfo();
      redraw();
    }

    // ---- Board click ----
    els.canvas.addEventListener("click", (e) => {
      if (app.busy || app.game.terminal) return;
      if (!isHumansTurn()) return;
      const rect = els.canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (els.canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (els.canvas.height / rect.height);
      const cell = pixelToCell(x, y);
      if (!cell) return;
      const action = cell.row * app.boardSize + cell.col;
      if (app.game.board[action] !== 0) return;
      if (app.pendingAction === action) app.pendingAction = null;
      else app.pendingAction = action;
      updateInfo();
      redraw();
    });
    // Extra belt-and-suspenders against iOS double-tap zoom on the board.
    els.canvas.addEventListener("dblclick", (e) => e.preventDefault());

    function confirmPending() {
      if (app.busy || app.pendingAction === null) return;
      const action = app.pendingAction;
      app.pendingAction = null;
      playMove(action);
    }

    function playMove(action) {
      app.game.applyAction(action);
      app.history.push(action);
      startStoneAnim(action);
      if (shouldReuseSearchTree() && app.aiSubtree && app.aiSubtree.children.has(action)) {
        app.aiSubtree = app.aiSubtree.children.get(action);
      } else {
        app.aiSubtree = null;
      }
      updateInfo();
      redraw();
      if (!app.game.terminal) maybeAiMove();
    }

    function maybeAiMove() {
      if (app.initialSetup) return;
      if (!hasAiModel() || app.busy || app.game.terminal) return;
      if (app.game.toPlay !== app.humanPlayer) aiMove();
    }

    async function aiMove() {
      if (app.game.terminal || app.busy) return;
      if (!(await ensureEvaluatorReady("쿨파고 깨우는 중"))) return;
      if (app.game.terminal || app.game.toPlay === app.humanPlayer) {
        scheduleEvaluatorIdleRelease();
        return;
      }

      setBusy(true);
      startThinkingGhosts(app.game.toPlay);
      const sims = parseInt(els.sims.value);
      const progressTemplate = pickLookaheadTemplate();
      app.aiProgress = lookaheadText(1, progressTemplate);
      app.statusOverride = { text: app.aiProgress, cls: "thinking" };
      updateInfo();
      const t0 = performance.now();
      try {
        const result = await app.mcts.run(app.game, sims, {
          reuseRoot: shouldReuseSearchTree() ? app.aiSubtree : null,
          onProgress: (done, total, candidates) => {
            updateThinkingGhostCandidates(candidates);
            app.aiProgress = lookaheadText(done, progressTemplate);
            updateThinkingStatus(app.aiProgress);
          },
        });
        app.aiTimeMs = performance.now() - t0;
        app.aiValue = result.rootValue;
        app.aiProgress = null;
        app.statusOverride = null;
        stopThinkingGhosts(false);
        app.game.applyAction(result.action);
        app.history.push(result.action);
        startStoneAnim(result.action);
        app.aiSubtree = shouldReuseSearchTree() ? result.nextRoot : null;
        updateInfo();
        redraw();
      } catch (err) {
        console.error(err);
        app.aiProgress = null;
        app.statusOverride = null;
        stopThinkingGhosts(false);
        flashStatus("쿨파고 오류", "error");
      }
      setBusy(false);
      updateInfo();
      scheduleEvaluatorIdleRelease();
    }

    async function showHint() {
      if (app.game.terminal || app.busy || !isHumansTurn()) return;
      if (!(await ensureEvaluatorReady("훈수 준비 중"))) return;
      if (app.game.terminal || !isHumansTurn()) {
        scheduleEvaluatorIdleRelease();
        return;
      }

      const sims = parseInt(els.sims.value);
      const progressTemplate = pickLookaheadTemplate();
      clearTimeout(flashStatus._t);
      app.statusOverride = { text: lookaheadText(1, progressTemplate), cls: "thinking" };
      setBusy(true);
      startThinkingGhosts(app.game.toPlay);
      const t0 = performance.now();
      try {
        const result = await app.mcts.run(app.game, sims, {
          reuseRoot: shouldReuseSearchTree() ? app.aiSubtree : null,
          onProgress: (done, total, candidates) => {
            updateThinkingGhostCandidates(candidates);
            updateThinkingStatus(lookaheadText(done, progressTemplate));
          },
        });
        app.pendingAction = result.action;
        app.statusOverride = null;
        stopThinkingGhosts(false);
        setBusy(false);
        redraw();
        flashStatus(`추천 수 표시 · 형세 ${fmtValue(result.rootValue)} · ${fmtDuration(performance.now() - t0)}`, "thinking", 1800);
        scheduleEvaluatorIdleRelease();
      } catch (err) {
        console.error(err);
        app.statusOverride = null;
        stopThinkingGhosts(false);
        setBusy(false);
        flashStatus("힌트 계산 실패", "error");
        scheduleEvaluatorIdleRelease();
      }
    }

    // ---- Canvas rendering ----
    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function syncCanvasSize() {
      const canvas = els.canvas;
      const rect = canvas.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return false;
      const dpr = canvasPixelRatio();
      const w = Math.max(1, Math.round(rect.width * dpr));
      const h = Math.max(1, Math.round(rect.height * dpr));
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
        return true;
      }
      return false;
    }

    function cellMetrics() {
      const W = els.canvas.width;
      const H = els.canvas.height;
      const S = Math.min(W, H);
      const offsetX = (W - S) / 2;
      const offsetY = (H - S) / 2;
      const marginRatio = parseFloat(cssVar("--board-grid-margin")) || 0.03;
      const margin = S * marginRatio;
      const step = (S - 2 * margin) / (app.boardSize - 1);
      return { W, H, S, offsetX, offsetY, margin, step };
    }

    function pixelToCell(x, y) {
      const { margin, step, offsetX, offsetY } = cellMetrics();
      const col = Math.round((x - offsetX - margin) / step);
      const row = Math.round((y - offsetY - margin) / step);
      if (row < 0 || row >= app.boardSize || col < 0 || col >= app.boardSize) return null;
      const dx = Math.abs(x - offsetX - (margin + col * step));
      const dy = Math.abs(y - offsetY - (margin + row * step));
      if (dx > step * 0.5 || dy > step * 0.5) return null;
      return { row, col };
    }

    function redraw() {
      const ctx = app.ctx || (app.ctx = els.canvas.getContext("2d"));
      const { W, H, S, offsetX, offsetY, margin, step } = cellMetrics();
      const stoneR = step * 0.44;
      const now = performance.now();
      const cellX = (c) => offsetX + margin + c * step;
      const cellY = (r) => offsetY + margin + r * step;

      // Transparent canvas — the board glass behind shows through
      ctx.clearRect(0, 0, W, H);

      const lineColor = cssVar("--board-line");
      const starColor = cssVar("--board-star");

      // Grid lines
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = Math.max(1, S * 0.0014);
      for (let i = 0; i < app.boardSize; i++) {
        const px = cellX(i), py = cellY(i);
        ctx.beginPath(); ctx.moveTo(cellX(0), py); ctx.lineTo(cellX(app.boardSize - 1), py); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px, cellY(0)); ctx.lineTo(px, cellY(app.boardSize - 1)); ctx.stroke();
      }

      // Star points
      ctx.fillStyle = starColor;
      for (const [r, c] of starPoints(app.boardSize)) {
        ctx.beginPath();
        ctx.arc(cellX(c), cellY(r), Math.max(2.2, step * 0.06), 0, Math.PI * 2);
        ctx.fill();
      }

      // Stones (with drop-in animation)
  for (let i = 0; i < app.game.actionSize; i++) {
    const v = app.game.board[i];
    if (v === 0) continue;
        const r = Math.floor(i / app.boardSize);
        const c = i % app.boardSize;
        const cx = cellX(c), cy = cellY(r);
        const anim = app.anims.get(i);
        if (anim) {
          const t = Math.min(1, (now - anim.start) / STONE_ANIM_MS);
          const scale = 0.35 + easeOutBack(t) * 0.65; // 0.35 -> 1.0 with slight overshoot
          const alpha = easeOutCubic(Math.min(1, t * 1.4));
          drawGlassStone(ctx, cx, cy, stoneR * scale, v, alpha);
        } else {
      drawGlassStone(ctx, cx, cy, stoneR, v, 1.0);
    }
  }

  // Fleeting candidate ghosts while MCTS is thinking. These are intentionally
  // softer than the pending stone so users do not confuse them with a selection.
  if (app.thinkingGhostSlots.length > 0) {
    for (const slot of app.thinkingGhostSlots) {
      if (app.game.board[slot.action] !== 0) continue;
      const age = now - slot.start;
      if (age < 0 || age >= slot.life) continue;
      const t = age / slot.life;
      const appear = easeOutCubic(clamp01(t / 0.18));
      const disappear = 1 - easeInCubic(clamp01((t - 0.22) / 0.78));
      const bubble = Math.max(0, Math.min(appear, disappear));
      const alpha = Math.min(easeOutCubic(clamp01(t / 0.08)), disappear) * 0.28;
      const scale = 0.24 + bubble * 0.58;
      const bob = -easeOutCubic(t) * 0.05 * stoneR;
      const r = Math.floor(slot.action / app.boardSize);
      const c = slot.action % app.boardSize;
      drawThinkingGhostStone(ctx, cellX(c), cellY(r) + bob, stoneR * scale, slot.player, alpha, t);
    }
  }

  // Pending ghost (dedicated renderer — no white highlights so color reads true)
  if (app.pendingAction !== null && isHumansTurn()) {
        const r = Math.floor(app.pendingAction / app.boardSize);
        const c = app.pendingAction % app.boardSize;
        drawGhostStone(ctx, cellX(c), cellY(r), stoneR, app.humanPlayer);
      }

      // Last-move marker (small neutral dot) — hidden while the stone is still animating in
      if (app.game.lastAction !== null && app.pendingAction === null && !app.anims.has(app.game.lastAction)) {
        const v = app.game.board[app.game.lastAction];
        const r = Math.floor(app.game.lastAction / app.boardSize);
        const c = app.game.lastAction % app.boardSize;
        ctx.fillStyle = v === 1 ? "rgba(255,255,255,0.9)" : "rgba(0,0,0,0.75)";
        ctx.beginPath();
        ctx.arc(cellX(c), cellY(r), stoneR * 0.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    /*
     * Glass-marble stones: cast shadow + body + inner luminance + specular highlight + rim.
     *   v = 1 (black) or -1 (white). alpha < 1 makes it a ghost preview.
     */
    function drawGlassStone(ctx, cx, cy, r, v, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;

      // 1. Ambient occlusion / cast shadow below the stone
      const sh = ctx.createRadialGradient(cx + r * 0.04, cy + r * 0.18, r * 0.25, cx + r * 0.04, cy + r * 0.22, r * 1.3);
      sh.addColorStop(0, v === 1 ? "rgba(0,0,0,0.38)" : "rgba(0,0,0,0.22)");
      sh.addColorStop(0.55, v === 1 ? "rgba(0,0,0,0.14)" : "rgba(0,0,0,0.08)");
      sh.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = sh;
      ctx.beginPath();
      ctx.ellipse(cx + r * 0.04, cy + r * 0.22, r * 1.2, r * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();

      // 2. Body — clipped to circle
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.clip();

      if (v === 1) {
        // Black glass marble body
        const body = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.35, r * 0.05, cx + r * 0.1, cy + r * 0.18, r * 1.1);
        body.addColorStop(0, "#6e6e78");
        body.addColorStop(0.28, "#2a2a32");
        body.addColorStop(0.7, "#0e0e14");
        body.addColorStop(1, "#020206");
        ctx.fillStyle = body;
        ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

        // Broad glow (simulated sub-surface)
        const glow = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.4, 0, cx - r * 0.3, cy - r * 0.4, r * 0.95);
        glow.addColorStop(0, "rgba(255,255,255,0.38)");
        glow.addColorStop(0.4, "rgba(255,255,255,0.1)");
        glow.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

        // Sharp specular highlight
        const spec = ctx.createRadialGradient(cx - r * 0.38, cy - r * 0.46, 0, cx - r * 0.38, cy - r * 0.46, r * 0.34);
        spec.addColorStop(0, "rgba(255,255,255,0.78)");
        spec.addColorStop(0.45, "rgba(255,255,255,0.25)");
        spec.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = spec;
        ctx.beginPath();
        ctx.ellipse(cx - r * 0.38, cy - r * 0.46, r * 0.32, r * 0.18, -Math.PI / 5, 0, Math.PI * 2);
        ctx.fill();

        // Counter-light on bottom-right (warm)
        const cool = ctx.createRadialGradient(cx + r * 0.35, cy + r * 0.3, 0, cx + r * 0.35, cy + r * 0.3, r * 0.7);
        cool.addColorStop(0, "rgba(120, 140, 200, 0.18)");
        cool.addColorStop(1, "rgba(120, 140, 200, 0)");
        ctx.fillStyle = cool;
        ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
      } else {
        // White glass marble body
        const body = ctx.createRadialGradient(cx - r * 0.22, cy - r * 0.28, r * 0.05, cx + r * 0.12, cy + r * 0.22, r * 1.05);
        body.addColorStop(0, "#ffffff");
        body.addColorStop(0.45, "#f4f4f6");
        body.addColorStop(0.85, "#c2c2ca");
        body.addColorStop(1, "#a8a8b2");
        ctx.fillStyle = body;
        ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

        // Broad top glow
        const glow = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.35, 0, cx - r * 0.3, cy - r * 0.35, r * 0.85);
        glow.addColorStop(0, "rgba(255,255,255,0.95)");
        glow.addColorStop(0.5, "rgba(255,255,255,0.4)");
        glow.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(cx - r, cy - r, r * 2, r * 2);

        // Crisp specular
        const spec = ctx.createRadialGradient(cx - r * 0.35, cy - r * 0.4, 0, cx - r * 0.35, cy - r * 0.4, r * 0.3);
        spec.addColorStop(0, "rgba(255,255,255,1)");
        spec.addColorStop(0.5, "rgba(255,255,255,0.5)");
        spec.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = spec;
        ctx.beginPath();
        ctx.ellipse(cx - r * 0.35, cy - r * 0.4, r * 0.28, r * 0.17, -Math.PI / 5, 0, Math.PI * 2);
        ctx.fill();

        // Cool rim on lower-right (glass tint)
        const cool = ctx.createRadialGradient(cx + r * 0.4, cy + r * 0.35, 0, cx + r * 0.4, cy + r * 0.35, r * 0.75);
        cool.addColorStop(0, "rgba(140, 160, 200, 0.18)");
        cool.addColorStop(1, "rgba(140, 160, 200, 0)");
        ctx.fillStyle = cool;
        ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
      }
      ctx.restore();

      // 3. Outer rim (on the boundary, outside clip)
      ctx.strokeStyle = v === 1 ? "rgba(255,255,255,0.18)" : "rgba(30,30,50,0.2)";
      ctx.lineWidth = Math.max(0.6, r * 0.035);
      ctx.beginPath(); ctx.arc(cx, cy, r - ctx.lineWidth / 2, 0, Math.PI * 2); ctx.stroke();

      ctx.restore();
    }

    /*
     * Ghost (pending) stone. Must read clearly as the player's color, so we
     * deliberately skip the white glow/specular layers that wash a translucent
     * black stone out to look white-ish over a light glass surface.
     */
function drawGhostStone(ctx, cx, cy, r, v) {
      ctx.save();
      // Black needs more opacity to read as black over translucent glass; white
      // reads fine at lower alpha. Asymmetric on purpose.
      ctx.globalAlpha = v === 1 ? 0.72 : 0.55;

      // Soft cast shadow (slightly stronger for black)
      const sh = ctx.createRadialGradient(cx, cy + r * 0.15, r * 0.2, cx, cy + r * 0.18, r * 1.15);
      sh.addColorStop(0, v === 1 ? "rgba(0,0,0,0.22)" : "rgba(0,0,0,0.16)");
      sh.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = sh;
      ctx.beginPath();
      ctx.ellipse(cx, cy + r * 0.18, r * 1.1, r * 0.38, 0, 0, Math.PI * 2);
      ctx.fill();

      // Solid color body — no white overlays, so color intent stays true
      if (v === 1) {
        const body = ctx.createRadialGradient(cx - r * 0.25, cy - r * 0.3, r * 0.05, cx, cy, r);
        body.addColorStop(0, "#1c1c22");
        body.addColorStop(0.55, "#08080c");
        body.addColorStop(1, "#000000");
        ctx.fillStyle = body;
      } else {
        const body = ctx.createRadialGradient(cx - r * 0.25, cy - r * 0.3, r * 0.05, cx, cy, r);
        body.addColorStop(0, "#ffffff");
        body.addColorStop(0.7, "#ededf1");
        body.addColorStop(1, "#b4b4bf");
        ctx.fillStyle = body;
      }
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();

      // Edge definition — crisp rim so ghost reads clearly on glass board
      ctx.globalAlpha = v === 1 ? 0.95 : 0.8;
      ctx.strokeStyle = v === 1 ? "rgba(0,0,0,0.85)" : "rgba(20,20,35,0.35)";
      ctx.lineWidth = Math.max(0.9, r * (v === 1 ? 0.055 : 0.045));
      ctx.beginPath(); ctx.arc(cx, cy, r - ctx.lineWidth / 2, 0, Math.PI * 2); ctx.stroke();

  ctx.restore();
}

function drawThinkingGhostStone(ctx, cx, cy, r, v, alpha, t = 0) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(0.4, alpha));

  const ringAlpha = v === 1 ? 0 : Math.max(0, alpha * (1 - clamp01(t / 0.58)));
  if (ringAlpha > 0.01) {
    ctx.save();
    ctx.globalAlpha = ringAlpha * 0.55;
    ctx.strokeStyle = "rgba(40,40,58,0.22)";
    ctx.lineWidth = Math.max(1, r * 0.08);
    ctx.beginPath();
    ctx.arc(cx, cy, r * (1.04 + easeOutCubic(clamp01(t / 0.58)) * 0.24), 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  const sh = ctx.createRadialGradient(cx, cy + r * 0.16, r * 0.2, cx, cy + r * 0.18, r * 1.1);
  sh.addColorStop(0, v === 1 ? "rgba(0,0,0,0.13)" : "rgba(0,0,0,0.08)");
  sh.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = sh;
  ctx.beginPath();
  ctx.ellipse(cx, cy + r * 0.2, r * 1.0, r * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  const body = ctx.createRadialGradient(cx - r * 0.25, cy - r * 0.3, r * 0.05, cx, cy, r);
  if (v === 1) {
    body.addColorStop(0, "#15151a");
    body.addColorStop(0.62, "#060608");
    body.addColorStop(1, "#000000");
  } else {
    body.addColorStop(0, "#ffffff");
    body.addColorStop(0.7, "#f0f0f4");
    body.addColorStop(1, "#c0c0cc");
  }
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = Math.max(0, Math.min(0.55, alpha * 1.2));
  ctx.strokeStyle = v === 1 ? "rgba(0,0,0,0.65)" : "rgba(30,30,50,0.26)";
  ctx.lineWidth = Math.max(0.8, r * 0.05);
  ctx.beginPath();
  ctx.arc(cx, cy, r - ctx.lineWidth / 2, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();
}

// Repaint if a future theme toggle changes CSS-driven board colors.
new MutationObserver(() => redraw()).observe(document.documentElement, {
      attributes: true,
      attributeFilter: ["data-theme"],
    });

    // Block iOS double-tap zoom globally as a fallback (belt and suspenders).
    document.addEventListener("dblclick", (e) => e.preventDefault(), { passive: false });

    // Keep canvas bitmap in sync with its actual CSS size × devicePixelRatio.
    // Fixes blurry rendering on hi-DPI screens and stones appearing slightly tall
    // when the CSS box rounds to a non-square pixel size.
    function handleResize() {
      if (syncCanvasSize()) redraw();
      updateDebugPanel();
    }
    if (window.ResizeObserver) {
      new ResizeObserver(handleResize).observe(els.canvas);
    }
    window.addEventListener("resize", handleResize);
    window.addEventListener("orientationchange", handleResize);
    window.addEventListener("visibilitychange", syncDebugTimer);
    els.debugPanel.addEventListener("toggle", syncDebugTimer);

    // ---- Auto-load bundled default model ----
    async function tryAutoLoadDefault() {
      if (app.defaultModelLoadStarted || app.evaluator) return;
      app.defaultModelLoadStarted = true;
      if (location.protocol === "file:") {
        console.warn("file:// cannot fetch(); serve via an HTTP server instead.");
        flashStatus("file:// 에서는 모델을 가져올 수 없습니다 — HTTP 서버로 열어주세요", "error", 8000);
        return;
      }
      setBusy(true);
      flashStatus(`기본 모델 로딩 중… ${backendLabel(app.backend)}`, "thinking", 120_000);
      let stage = "다운로드";
      try {
        const resp = await fetch(DEFAULT_MODEL_URL, { cache: "force-cache" });
        if (!resp.ok) throw new Error(`HTTP ${resp.status} on ${DEFAULT_MODEL_URL}`);
        stage = "모델 읽기";
        const buf = await resp.arrayBuffer();
        const reusable = lowMemoryMode() ? null : buf.slice(0);
        const modelBytes = buf.byteLength;
        stage = `추론 준비 (${(buf.byteLength / 1024 / 1024).toFixed(1)}MB)`;
        if (app.evaluator) app.evaluator.terminate();
        app.evaluator = await WorkerEvaluator.fromArrayBuffer(buf, app.boardSize, app.backend, lowMemoryMode());
        app.mcts = makeMcts();
        app.modelBuffer = reusable;
        app.modelFile = null;
        app.modelSource = "default";
        app.modelBytes = modelBytes;
        app.modelName = "best.onnx (기본)";
        app.modelTitle = "best.onnx (기본 모델)";
        els.fileName.textContent = "best.onnx (기본)";
        els.fileName.title = "best.onnx (기본 모델)";
        app.aiSubtree = null;
        app.statusOverride = null;
        setBusy(false);
        updateInfo();
        maybeAiMove();
        scheduleEvaluatorIdleRelease();
      } catch (err) {
        console.error(`[default-model load] failed at stage "${stage}":`, err);
        setBusy(false);
        const msg = (err && err.message) ? String(err.message).slice(0, 80) : "알 수 없음";
        flashStatus(`로드 실패 [${stage}]: ${msg}`, "error", 8000);
        updateInfo();
      }
    }

    // ---- Init ----
    if (isIosDevice()) document.documentElement.classList.add("ios-low-memory");
    applyDeviceDefaults();
    updateInfo();
    syncCanvasSize();
    redraw();
    syncDebugTimer();
    // Extra sync after first paint — layout/viewport on iOS can settle post-load.
    requestAnimationFrame(() => { if (syncCanvasSize()) redraw(); });
    window.addEventListener("load", handleResize);
    els.btnSheetClose.textContent = "시작";
    openSheet();

  </script>
</body>

</html>
